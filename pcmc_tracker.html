<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>PCMC Time Tracker</title>
  <meta name="description" content="Philippine Children's Medical Center Daily Time Record"/>
  <meta name="theme-color" content="#0E3550"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="PCMC Tracker"/>
  <link rel="manifest" href="manifest.json"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',Arial,sans-serif;background:#EBF5FB;color:#1a2535;min-height:100vh;}
    input,textarea,button{font-family:inherit;}

    /* HEADER */
    .header{background:linear-gradient(135deg,#0E3550 0%,#1A5276 55%,#2471A3 100%);padding:20px 20px 16px;box-shadow:0 4px 20px rgba(14,53,80,0.35);}
    .header-brand{display:flex;align-items:center;gap:13px;margin-bottom:14px;}
    .header-logo{width:52px;height:52px;border-radius:50%;overflow:hidden;border:2.5px solid rgba(255,255,255,0.4);background:#fff;flex-shrink:0;}
    .header-logo img{width:100%;height:100%;object-fit:cover;}
    .header-title{color:#fff;font-weight:800;font-size:16px;line-height:1.2;}
    .header-sub{color:rgba(255,255,255,0.55);font-size:11px;margin-top:2px;}
    .stats{display:flex;gap:8px;flex-wrap:wrap;}
    .stat{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);border-radius:10px;padding:7px 13px;flex:1;min-width:90px;}
    .stat-val{font-weight:800;font-size:17px;}
    .stat-lbl{color:rgba(255,255,255,0.5);font-size:10px;margin-top:1px;}

    /* TABS */
    .tabs-wrap{max-width:820px;margin:0 auto;padding:0 14px;}
    .tabs{display:flex;margin:16px 0;background:#C8DDEF;border-radius:12px;padding:4px;width:fit-content;}
    .tab-btn{padding:7px 20px;border-radius:9px;border:none;cursor:pointer;font-weight:700;font-size:13px;background:transparent;color:#6b7f99;transition:all 0.18s;}
    .tab-btn.active{background:#fff;color:#1A5276;box-shadow:0 1px 6px rgba(26,82,118,0.15);}

    /* CARD */
    .card{background:#fff;border-radius:18px;padding:24px 20px;box-shadow:0 2px 18px rgba(26,82,118,0.09);margin-bottom:20px;}
    .card-title{font-weight:700;font-size:15px;margin-bottom:18px;color:#1A5276;}

    /* FORM */
    label.lbl{display:block;font-weight:700;font-size:11px;color:#6b7f99;margin-bottom:5px;letter-spacing:0.05em;text-transform:uppercase;}
    .input{width:100%;padding:10px 12px;border:1.5px solid #C8DDEF;border-radius:10px;font-size:14px;color:#1a2535;background:#fff;outline:none;}
    .input:focus{border-color:#4A90D9;}
    textarea.input{resize:vertical;line-height:1.6;}
    .input.error{border-color:#c0392b;background:#fdf0ee;}
    .row2{display:flex;gap:12px;}
    .row2>div{flex:1;}
    .day-badge{display:inline-block;background:linear-gradient(90deg,#1A5276,#4A90D9);color:#fff;font-weight:800;font-size:12px;border-radius:7px;padding:3px 11px;letter-spacing:0.04em;margin-right:7px;}
    .date-sub{font-size:12px;color:#6b7f99;margin-top:7px;}
    .hint{font-size:11px;color:#a0b5c8;margin-top:4px;}
    .confirm{font-size:12px;color:#1A8F5A;font-weight:600;margin-top:4px;}
    .err-msg{font-size:11px;color:#c0392b;margin-top:4px;}

    /* SUMMARY */
    .summary{background:#EBF5FB;border:1.5px solid #C8DDEF;border-radius:12px;padding:13px 16px;margin-bottom:14px;}
    .summary-title{font-size:11px;font-weight:700;color:#6b7f99;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px;}
    .summary-cols{display:flex;gap:0;flex-wrap:wrap;align-items:stretch;}
    .summary-col{padding:0 14px;}
    .summary-col:first-child{padding-left:0;}
    .summary-divider{width:1px;background:#C8DDEF;align-self:stretch;}
    .summary-lbl{font-size:11px;color:#6b7f99;margin-bottom:2px;}
    .summary-val{font-weight:800;font-size:20px;}
    .break-note{margin-top:9px;font-size:11px;color:#6b7f99;background:#FEF9EE;border:1px solid #F8E5C0;border-radius:6px;padding:4px 10px;display:inline-block;}

    /* BUTTONS */
    .btn-primary{width:100%;padding:11px;background:linear-gradient(90deg,#1A5276,#4A90D9);color:#fff;border:none;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer;box-shadow:0 2px 10px rgba(26,82,118,0.2);}
    .btn-primary:disabled{background:#b0c4d8;cursor:not-allowed;box-shadow:none;}
    .btn-cancel{padding:11px 18px;background:#EBF5FB;color:#6b7f99;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;}
    .btn-row{display:flex;gap:10px;}

    /* TOAST */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A5276;color:#fff;padding:10px 22px;border-radius:30px;font-weight:700;font-size:13px;box-shadow:0 4px 18px rgba(0,0,0,0.2);z-index:999;opacity:0;transition:opacity 0.3s;}
    .toast.show{opacity:1;}

    /* WEEK BLOCK */
    .week-block{background:#fff;border-radius:18px;margin-bottom:20px;box-shadow:0 2px 18px rgba(26,82,118,0.08);overflow:hidden;}
    .week-header{background:linear-gradient(90deg,#0E3550,#1A5276);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:7px;}
    .week-label{color:#fff;font-weight:700;font-size:13px;}
    .week-badges{display:flex;gap:7px;}
    .badge-rendered{background:rgba(255,255,255,0.12);border-radius:7px;padding:3px 11px;color:rgba(255,255,255,0.7);font-weight:600;font-size:12px;}
    .badge-paid{background:#1A8F5A;border-radius:7px;padding:3px 11px;color:#fff;font-weight:800;font-size:12px;}
    .col-headers{display:flex;padding:7px 18px;background:#F2F8FD;border-bottom:1px solid #C8DDEF;}
    .ch{font-size:10px;font-weight:700;color:#a0b5c8;text-transform:uppercase;}
    .rec-row{padding:11px 18px;border-bottom:1px solid #EBF5FB;display:flex;align-items:center;}
    .rec-row:last-child{border-bottom:none;}
    .day-chip{background:#EBF5FB;border:1px solid #C8DDEF;border-radius:8px;padding:4px 0;text-align:center;width:42px;flex-shrink:0;}
    .day-chip-name{font-weight:800;font-size:9px;color:#4A90D9;}
    .day-chip-num{font-weight:700;font-size:14px;color:#1a2535;}
    .rec-detail{flex:1;padding:0 10px;}
    .rec-time{font-weight:700;font-size:13px;color:#1a2535;}
    .rec-notes{font-size:12px;color:#6b7f99;margin-top:3px;word-break:break-word;}
    .pill-rendered{background:#EBF5FB;color:#4a6a8a;border-radius:6px;padding:3px 8px;font-weight:700;font-size:12px;}
    .pill-paid{background:#E8F8F1;color:#1A8F5A;border-radius:6px;padding:3px 8px;font-weight:800;font-size:12px;}
    .icon-btn{border:none;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}

    /* EMPTY */
    .empty{text-align:center;padding:48px 24px;color:#a0b5c8;}
    .empty-icon{font-size:38px;margin-bottom:10px;}

    /* SYNC STATUS */
    .sync-bar{display:flex;align-items:center;gap:7px;font-size:12px;margin-bottom:14px;padding:8px 12px;border-radius:9px;}
    .sync-bar.ok{background:#E8F8F1;color:#1A8F5A;}
    .sync-bar.loading{background:#EBF5FB;color:#4A90D9;}
    .sync-bar.err{background:#FDECEC;color:#c0392b;}
    .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .dot.ok{background:#1A8F5A;}
    .dot.loading{background:#4A90D9;animation:pulse 1s infinite;}
    .dot.err{background:#c0392b;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  </style>
</head>

// ── Utils ──────────────────────────────────────────────────────────────────
function todayStr(){ return new Date().toISOString().split("T")[0]; }

function parseTime(str){
  if(!str) return null;
  str = str.trim().toLowerCase().replace(/\s+/g,"");
  let h=null,m=0,pm=false,am=false;
  if(str.endsWith("pm")){pm=true;str=str.slice(0,-2);}
  else if(str.endsWith("am")){am=true;str=str.slice(0,-2);}
  if(str.includes(":")){const p=str.split(":");h=parseInt(p[0]);m=parseInt(p[1])||0;}
  else if(str.length<=2){h=parseInt(str);}
  else if(str.length===3){h=parseInt(str[0]);m=parseInt(str.slice(1));}
  else if(str.length===4){h=parseInt(str.slice(0,2));m=parseInt(str.slice(2));}
  else return null;
  if(isNaN(h)||isNaN(m)||m<0||m>59) return null;
  if(pm&&h!==12)h+=12;
  if(am&&h===12)h=0;
  if(!pm&&!am&&h>=1&&h<=6)h+=12;
  if(h<0||h>23) return null;
  return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");
}

function fmt12(s){
  if(!s)return"";
  const[h,m]=s.split(":").map(Number);
  return (h%12||12)+":"+String(m).padStart(2,"0")+" "+(h>=12?"PM":"AM");
}

function toDecimal(s){
  if(!s)return null;
  const[h,m]=s.split(":").map(Number);
  return h+m/60;
}

function hhMM(dec){
  if(dec==null||isNaN(dec)||dec<=0)return"--h --m";
  const h=Math.floor(dec),m=Math.round((dec-h)*60);
  return String(h).padStart(2,"0")+"h "+String(m).padStart(2,"0")+"m";
}

function paidHrs(rendered){
  if(rendered==null||rendered<=0)return null;
  return rendered - Math.floor(rendered/4.5)*0.5;
}

function weekKey(dateStr){
  const d=new Date(dateStr+"T00:00:00"),day=d.getDay();
  const mon=new Date(d);mon.setDate(d.getDate()+(day===0?-6:1-day));
  return mon.toISOString().split("T")[0];
}

function dayName(dateStr){
  if(!dateStr)return"";
  return new Date(dateStr+"T00:00:00").toLocaleDateString("en-PH",{weekday:"long"});
}

function fmtDateLong(dateStr){
  if(!dateStr)return"";
  return new Date(dateStr+"T00:00:00").toLocaleDateString("en-PH",{year:"numeric",month:"long",day:"numeric"});
}

function weekEnd(wk){
  const d=new Date(wk+"T00:00:00");d.setDate(d.getDate()+6);return d;
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

async function loadFromSheet(){
  syncStatus="loading"; render();
  try{
    const res = await fetch(GAS_URL);
    const json = await res.json();
    if(json.status==="ok"){
      records = (json.data||[]).map(r=>({
        id: r.id || r.ID || Date.now(),
        date: r.date || r.Date || "",
        day: r.day || r.Day || "",
        timeIn: r.timeIn || r.TimeIn || "",
        timeOut: r.timeOut || r.TimeOut || "",
        renderedHours: parseFloat(r.renderedHours||r.RenderedHours||0),
        paidHours: parseFloat(r.paidHours||r.PaidHours||0),
        weekKey: r.weekKey || r.WeekKey || "",
        notes: r.notes || r.Notes || "",
      })).filter(r=>r.date);
      syncStatus="ok";
    } else { syncStatus="err"; }
  } catch(e){ syncStatus="err"; }
  render();
}

async function saveToSheet(entry){
  try{
    await fetch(GAS_URL,{
      method:"POST",
      body: JSON.stringify({action:"save", record: entry}),
    });
    syncStatus="ok";
  } catch(e){ syncStatus="err"; }
}

async function deleteFromSheet(id){
  try{
    await fetch(GAS_URL,{
      method:"POST",
      body: JSON.stringify({action:"delete", id: String(id)}),
    });
    syncStatus="ok";
  } catch(e){ syncStatus="err"; }
}

// ── Actions ────────────────────────────────────────────────────────────────
function computeRendered(){
  const inn=toDecimal(form.timeIn),out=toDecimal(form.timeOut);
  if(inn!==null&&out!==null&&out>inn)return out-inn;
  return null;
}

async function handleSave(){
  const rh=computeRendered();
  if(!form.date||!form.timeIn||!form.timeOut||!rh||rh<=0)return;
  const entry={
    id: editId??Date.now(),
    date: form.date, day: dayName(form.date),
    timeIn: form.timeIn, timeOut: form.timeOut,
    renderedHours: rh, paidHours: paidHrs(rh),
    weekKey: weekKey(form.date), notes: form.notes,
  };
  if(editId){ records=records.map(x=>x.id===editId?entry:x); editId=null; }
  else { records=[...records,entry]; }
  form={date:todayStr(),timeIn:"",timeOut:"",timeInRaw:"",timeOutRaw:"",timeInErr:false,timeOutErr:false,notes:""};
  tab="history"; render();
  showToast("✅ Saved to Google Sheets!");
  syncStatus="loading"; render();
  await saveToSheet(entry);
  render();
}

async function handleDelete(id){
  records=records.filter(x=>x.id!==id);
  render();
  showToast("🗑️ Entry deleted");
  await deleteFromSheet(id);
  render();
}

function handleEdit(rec){
  form={
    date:rec.date,
    timeIn:rec.timeIn, timeOut:rec.timeOut,
    timeInRaw:fmt12(rec.timeIn), timeOutRaw:fmt12(rec.timeOut),
    timeInErr:false, timeOutErr:false, notes:rec.notes
  };
  editId=rec.id; tab="log"; render();
  window.scrollTo({top:0,behavior:"smooth"});
}

function blurTime(field){
  const raw = field==="in" ? form.timeInRaw : form.timeOutRaw;
  const parsed = parseTime(raw);
  if(!raw.trim()){
    if(field==="in"){form.timeIn="";form.timeInErr=false;}
    else{form.timeOut="";form.timeOutErr=false;}
  } else if(parsed){
    if(field==="in"){form.timeIn=parsed;form.timeInRaw=fmt12(parsed);form.timeInErr=false;}
    else{form.timeOut=parsed;form.timeOutRaw=fmt12(parsed);form.timeOutErr=false;}
  } else {
    if(field==="in"){form.timeIn="";form.timeInErr=true;}
    else{form.timeOut="";form.timeOutErr=true;}
  }
  render();
}

// ── Render ─────────────────────────────────────────────────────────────────
function render(){
  document.getElementById("app").innerHTML = buildApp();
  bindEvents();
}

function buildSyncBar(){
  if(syncStatus==="loading") return `<div class="sync-bar loading"><div class="dot loading"></div>Syncing with Google Sheets…</div>`;
  if(syncStatus==="ok") return `<div class="sync-bar ok"><div class="dot ok"></div>Synced with Google Sheets</div>`;
  return `<div class="sync-bar err"><div class="dot err"></div>Sync error — check connection. <a href="#" onclick="loadFromSheet();return false;" style="color:#c0392b;font-weight:700;margin-left:4px;">Retry</a></div>`;
}

function buildStats(){
  const today=todayStr();
  const todayPaid=records.filter(r=>r.date===today).reduce((s,r)=>s+(r.paidHours||0),0);
  const wk=weekKey(today);
  const wkPaid=records.filter(r=>r.weekKey===wk).reduce((s,r)=>s+(r.paidHours||0),0);
  return `
    <div class="stats">
      <div class="stat"><div class="stat-val" style="color:#7EC8F7">${hhMM(todayPaid||null)}</div><div class="stat-lbl">Today (Paid)</div></div>
      <div class="stat"><div class="stat-val" style="color:#5DDEAE">${hhMM(wkPaid||null)}</div><div class="stat-lbl">This Week (Paid)</div></div>
      <div class="stat"><div class="stat-val" style="color:#F8C471">${records.length||"0"}</div><div class="stat-lbl">Total Entries</div></div>
    </div>`;
}

function buildForm(){
  const rh=computeRendered();
  const ph=paidHrs(rh);
  const breaks=rh!==null?Math.floor(rh/4.5):0;
  const canSave=form.date&&form.timeIn&&form.timeOut&&rh>0;

  const summaryHTML = rh&&rh>0 ? `
    <div class="summary">
      <div class="summary-title">Hours Summary</div>
      <div class="summary-cols">
        <div class="summary-col"><div class="summary-lbl">Time Rendered</div><div class="summary-val" style="color:#1a2535">${hhMM(rh)}</div></div>
        <div class="summary-divider"></div>
        <div class="summary-col"><div class="summary-lbl">Break Deducted</div><div class="summary-val" style="color:${breaks>0?"#E67E22":"#aabbd0"}">${breaks>0?"– "+(breaks*30)+"m":"None"}</div></div>
        <div class="summary-divider"></div>
        <div class="summary-col"><div class="summary-lbl">Paid Hours</div><div class="summary-val" style="color:#1A8F5A">${hhMM(ph)}</div></div>
      </div>
      ${breaks>0?`<div class="break-note">ℹ️ ${breaks} × 30-min unpaid break${breaks>1?"s":""} deducted (${breaks} × 4.5 hrs)</div>`:""}
    </div>` : "";

  return `
    <div class="card">
      ${buildSyncBar()}
      <div class="card-title">${editId?"✏️ Edit Record":"➕ Add Time Entry"}</div>
      <div style="margin-bottom:14px;">
        <label class="lbl">Date</label>
        <input class="input" type="date" id="f-date" value="${form.date}"/>
        ${form.date?`<div class="date-sub"><span class="day-badge">${dayName(form.date).toUpperCase()}</span>${fmtDateLong(form.date)}</div>`:""}
      </div>
      <div class="row2" style="margin-bottom:14px;">
        <div>
          <label class="lbl">Time In</label>
          <input class="input ${form.timeInErr?"error":""}" id="f-timein" type="text" value="${form.timeInRaw}" placeholder="e.g. 8am, 8:30, 1730"/>
          ${form.timeInErr?`<div class="err-msg">⚠ Unrecognized format</div>`:form.timeIn?`<div class="confirm">✓ ${fmt12(form.timeIn)}</div>`:`<div class="hint">8am · 8:30 · 830 · 1730</div>`}
        </div>
        <div>
          <label class="lbl">Time Out</label>
          <input class="input ${form.timeOutErr?"error":""}" id="f-timeout" type="text" value="${form.timeOutRaw}" placeholder="e.g. 5pm, 17:00"/>
          ${form.timeOutErr?`<div class="err-msg">⚠ Unrecognized format</div>`:form.timeOut?`<div class="confirm">✓ ${fmt12(form.timeOut)}</div>`:`<div class="hint">5pm · 17:00 · 1700</div>`}
        </div>
      </div>
      ${summaryHTML}
      <div style="margin-bottom:18px;">
        <label class="lbl">Notes / Activities</label>
        <textarea class="input" id="f-notes" rows="3" placeholder="e.g. Monday Conference, CPU, Zoom meeting…">${form.notes}</textarea>
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="btn-save" ${!canSave?"disabled":""}>${editId?"Update Record":"Save Entry"}</button>
        ${editId?`<button class="btn-cancel" id="btn-cancel">Cancel</button>`:""}
      </div>
    </div>`;
}

function buildHistory(){
  const byWeek={};
  records.forEach(r=>{ if(!byWeek[r.weekKey])byWeek[r.weekKey]=[]; byWeek[r.weekKey].push(r); });
  const wks=Object.keys(byWeek).sort((a,b)=>b.localeCompare(a));
  if(!wks.length) return `
    <div class="empty">
      ${buildSyncBar()}
      <div class="empty-icon">📭</div>
      <div style="font-weight:700;font-size:15px">No records yet</div>
      <div style="font-size:13px;margin-top:4px">Switch to Log Time to add your first entry.</div>
    </div>`;

  return `${buildSyncBar()}` + wks.map(wk=>{
    const recs=[...(byWeek[wk]||[])].sort((a,b)=>a.date.localeCompare(b.date));
    const wkPaid=recs.reduce((s,r)=>s+(r.paidHours||0),0);
    const wkRend=recs.reduce((s,r)=>s+(r.renderedHours||0),0);
    const we=weekEnd(wk);
    const wkLabel=new Date(wk+"T00:00:00").toLocaleDateString("en-PH",{month:"short",day:"numeric"})+" – "+we.toLocaleDateString("en-PH",{month:"short",day:"numeric",year:"numeric"});
    return `
      <div class="week-block">
        <div class="week-header">
          <div class="week-label">📅 Week of ${wkLabel}</div>
          <div class="week-badges">
            <div class="badge-rendered">Rendered: ${hhMM(wkRend)}</div>
            <div class="badge-paid">Paid: ${hhMM(wkPaid)}</div>
          </div>
        </div>
        <div class="col-headers">
          <div class="ch" style="width:50px">Day</div>
          <div class="ch" style="flex:1">Time In → Out</div>
          <div class="ch" style="width:82px;text-align:center">Rendered</div>
          <div class="ch" style="width:76px;text-align:center">Paid</div>
          <div class="ch" style="width:68px"></div>
        </div>
        ${recs.map(r=>`
          <div class="rec-row">
            <div class="day-chip">
              <div class="day-chip-name">${r.day.slice(0,3).toUpperCase()}</div>
              <div class="day-chip-num">${new Date(r.date+"T00:00:00").getDate()}</div>
            </div>
            <div class="rec-detail">
              <div class="rec-time">${fmt12(r.timeIn)} → ${fmt12(r.timeOut)}</div>
              ${r.notes?`<div class="rec-notes">📌 ${r.notes}</div>`:""}
            </div>
            <div style="width:82px;text-align:center"><span class="pill-rendered">${hhMM(r.renderedHours)}</span></div>
            <div style="width:76px;text-align:center"><span class="pill-paid">${hhMM(r.paidHours)}</span></div>
            <div style="width:68px;display:flex;gap:5px;justify-content:flex-end">
              <button class="icon-btn" style="background:#EBF5FB;color:#4A90D9" data-edit="${r.id}">✏️</button>
              <button class="icon-btn" style="background:#FDECEC;color:#c0392b" data-del="${r.id}">🗑️</button>
            </div>
          </div>`).join("")}
      </div>`;
  }).join("");
}

function buildApp(){
  return `
    <div class="header">
      <div style="max-width:820px;margin:0 auto">
        <div class="header-brand">
          <div class="header-logo"><img src="${LOGO}" alt="PCMC"/></div>
          <div>
            <div class="header-title">Philippine Children's Medical Center</div>
            <div class="header-sub">Daily Time Record Tracker</div>
          </div>
        </div>
        ${buildStats()}
      </div>
    </div>
    <div class="tabs-wrap">
      <div class="tabs">
        <button class="tab-btn ${tab==="log"?"active":""}" data-tab="log">📝 Log Time</button>
        <button class="tab-btn ${tab==="history"?"active":""}" data-tab="history">📋 Records</button>
      </div>
      ${tab==="log" ? buildForm() : buildHistory()}
      <div style="height:32px"></div>
    </div>`;
}

function bindEvents(){
  // Tabs
  document.querySelectorAll("[data-tab]").forEach(el=>{
    el.addEventListener("click",()=>{ tab=el.dataset.tab; render(); });
  });
  // Form fields
  const fd=document.getElementById("f-date");
  if(fd) fd.addEventListener("change",e=>{ form.date=e.target.value; render(); });
  const fn=document.getElementById("f-notes");
  if(fn) fn.addEventListener("input",e=>{ form.notes=e.target.value; });
  const ti=document.getElementById("f-timein");
  if(ti){
    ti.addEventListener("input",e=>{ form.timeInRaw=e.target.value; });
    ti.addEventListener("blur",()=>blurTime("in"));
  }
  const to=document.getElementById("f-timeout");
  if(to){
    to.addEventListener("input",e=>{ form.timeOutRaw=e.target.value; });
    to.addEventListener("blur",()=>blurTime("out"));
  }
  // Save
  const bs=document.getElementById("btn-save");
  if(bs) bs.addEventListener("click",handleSave);
  // Cancel
  const bc=document.getElementById("btn-cancel");
  if(bc) bc.addEventListener("click",()=>{ editId=null; form={date:todayStr(),timeIn:"",timeOut:"",timeInRaw:"",timeOutRaw:"",timeInErr:false,timeOutErr:false,notes:""}; render(); });
  // Edit / Delete
  document.querySelectorAll("[data-edit]").forEach(el=>{
    el.addEventListener("click",()=>{ const r=records.find(x=>String(x.id)===el.dataset.edit); if(r)handleEdit(r); });
  });
  document.querySelectorAll("[data-del]").forEach(el=>{
    el.addEventListener("click",()=>handleDelete(Number(el.dataset.del)||el.dataset.del));
  });
}

// ── Init ───────────────────────────────────────────────────────────────────
render();
loadFromSheet();
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
